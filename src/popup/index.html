<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI金融信息推送</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="container">
    <h1>AI金融信息推送 MVP</h1>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">新闻数量</div>
        <div class="stat-value" id="news-count">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">预测数量</div>
        <div class="stat-value" id="prediction-count">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">最后更新</div>
        <div class="stat-value" id="last-update">--</div>
      </div>
    </div>
    <div class="actions">
      <button id="refresh-btn">刷新数据</button>
      <button id="open-options">设置</button>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
