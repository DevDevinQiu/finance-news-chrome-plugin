<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI金融信息推送 - 设置</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="container">
    <h1>设置</h1>
    <div class="settings">
      <div class="setting-item">
        <label for="update-interval">更新间隔（分钟）:</label>
        <input type="number" id="update-interval" min="5" max="1440" value="60">
      </div>
      <div class="setting-item">
        <label for="auto-refresh">自动刷新:</label>
        <input type="checkbox" id="auto-refresh" checked>
      </div>
      <div class="setting-item">
        <label for="show-notifications">显示通知:</label>
        <input type="checkbox" id="show-notifications" checked>
      </div>
    </div>
    <div class="actions">
      <button id="save-btn">保存设置</button>
      <button id="clear-data-btn">清除数据</button>
    </div>
    <div id="status-message"></div>
  </div>
  <script src="index.js"></script>
</body>
</html>
